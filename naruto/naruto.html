<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ninja Hand Detection</title>

    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
      }
      #v_src,
      #out {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        transform: scaleX(-1);
      }
      #out {
        z-index: 2;
        pointer-events: none;
      }
      .darkness {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(10, 5, 0, 0.3);
        mix-blend-mode: multiply;
        pointer-events: none;
        z-index: 5;
      }
      .fx {
        position: absolute;
        height: auto;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        pointer-events: none;
        display: none;
        mix-blend-mode: screen;
        z-index: 20;
      }
      #n {
        width: 60vmin;
        max-width: 600px;
      }
      #s {
        width: 65vmin;
        max-width: 700px;
      }

      /* Back button */
      .back-btn {
          position: fixed;
          top: 16px; right: 16px;
          z-index: 20;
          background: rgba(10,10,30,0.55);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 12px;
          padding: 10px 18px;
          color: #fff;
          text-decoration: none;
          font-size: 0.82rem;
          font-weight: 600;
          transition: all 0.2s;
          font-family: sans-serif;
      }
      .back-btn:hover { background: rgba(255,255,255,0.1); }

      /* Loading overlay */
      #loader {
          position: fixed;
          inset: 0;
          z-index: 100;
          background: rgba(0,0,0,0.92);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          transition: opacity 0.6s;
          font-family: sans-serif;
      }
      #loader h2 { font-weight: 300; letter-spacing: 3px; font-size: 1.4rem; color: #fff;}
      #loader p { color: #666; font-size: 0.9rem; }
      .spinner {
          width: 40px; height: 40px;
          border: 3px solid rgba(255,255,255,0.1);
          border-top-color: #00fbff;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); }}
      .fade-out { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="loader">
        <div class="spinner"></div>
        <h2>NINJA MODE</h2>
        <p>Loading hand tracking model…</p>
    </div>
    <a href="../index.html" class="back-btn">← Back</a>

    <video id="v_src" autoplay playsinline></video>
    <canvas id="out"></canvas>
    <div class="darkness"></div>

    <video
      id="n"
      class="fx"
      src="../assets/naruto.mp4"
      muted
      autoplay
      loop
      playsinline
    ></video>
    <video
      id="s"
      class="fx"
      src="../assets/sasuke.mp4"
      muted
      autoplay
      loop
      playsinline
    ></video>

    <script>
      const vElement = document.getElementById("v_src");
      const cElement = document.getElementById("out");
      const ctx = cElement.getContext("2d");
      const n = document.getElementById("n");
      const s = document.getElementById("s");

      let pwr = [0, 0];
      let wasOpen = [false, false];

      function checkOpen(pts) {
        let count = 0;
        const wrist = pts[0];
        const tips = [8, 12, 16, 20];
        const pips = [6, 10, 14, 18];
        for (let i = 0; i < tips.length; i++) {
          const tip = pts[tips[i]];
          const pip = pts[pips[i]];
          if (
            Math.hypot(tip.x - wrist.x, tip.y - wrist.y) >
            Math.hypot(pip.x - wrist.x, pip.y - wrist.y)
          )
            count++;
        }
        return count >= 3;
      }

      function onResults(res) {
        const loader = document.getElementById('loader');
        if (loader && !loader.classList.contains('fade-out')) {
            loader.classList.add('fade-out');
        }

        cElement.width = vElement.videoWidth;
        cElement.height = vElement.videoHeight;
        ctx.save();
        ctx.clearRect(0, 0, cElement.width, cElement.height);

        let fL = false;
        let fR = false;

        n.style.display = "none";
        s.style.display = "none";

        if (res.multiHandLandmarks && res.multiHandedness) {
          res.multiHandLandmarks.forEach((pts, i) => {
            const label = res.multiHandedness[i].label;
            const isR = label === "Right";
            const idx = isR ? 1 : 0;

            // --- BRIGHT BLUE SKELETON ---
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00fbff";
            drawConnectors(ctx, pts, HAND_CONNECTIONS, {
              color: "#00d4ff",
              lineWidth: 3,
            });
            drawLandmarks(ctx, pts, {
              color: "#ffffff",
              lineWidth: 1,
              radius: 2,
            });
            ctx.restore();

            const open = checkOpen(pts);
            pwr[idx] += open ? 0.05 : -0.15;
            pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

            if (open && !wasOpen[idx]) {
              const vid = isR ? s : n;
              vid.currentTime = 0;
              vid.play();
            }
            wasOpen[idx] = open;

            const wrist = pts[0];
            const knk = pts[9];

            if (pwr[idx] > 0.01) {
              const vw = window.innerWidth;
              const vh = window.innerHeight;
              const vidW = cElement.width || 1;
              const vidH = cElement.height || 1;
              const scale = Math.min(vw / vidW, vh / vidH);
              const offX = (vw - vidW * scale) / 2;
              const offY = (vh - vidH * scale) / 2;

              if (isR) {
                fR = true;
                const tx = (wrist.x + knk.x) / 2;
                const ty = (wrist.y + knk.y) / 2;

                const screenX = (1 - tx) * vidW * scale + offX;
                const screenY = ty * vidH * scale + offY;

                s.style.left = `${screenX}px`;
                s.style.top = `${screenY}px`;
                s.style.display = "block";
                s.style.opacity = pwr[idx];
              } else {
                fL = true;
                const dx = knk.x - wrist.x;
                const dy = knk.y - wrist.y;
                const tx = knk.x + dx * 0.8;
                const ty = knk.y + dy * 0.8;

                const screenX = (1 - tx) * vidW * scale + offX;
                const screenY = ty * vidH * scale + offY;

                n.style.left = `${screenX}px`;
                n.style.top = `${screenY - 120}px`;
                n.style.display = "block";
                n.style.opacity = pwr[idx];
              }
            }
          });
        }

        if (!fL) {
          pwr[0] = Math.max(0, pwr[0] - 0.15);
          if (pwr[0] > 0.01) {
            n.style.display = "block";
            n.style.opacity = pwr[0];
          }
          wasOpen[0] = false;
        }
        if (!fR) {
          pwr[1] = Math.max(0, pwr[1] - 0.15);
          if (pwr[1] > 0.01) {
            s.style.display = "block";
            s.style.opacity = pwr[1];
          }
          wasOpen[1] = false;
        }
        ctx.restore();
      }

      const h = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
      });

      h.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      h.onResults(onResults);

      const cam = new Camera(vElement, {
        onFrame: async () => {
          await h.send({ image: vElement });
        },
        width: window.innerWidth > window.innerHeight ? 1280 : 720,
        height: window.innerWidth > window.innerHeight ? 720 : 1280,
      });
      cam.start();
    </script>
  </body>
</html>
