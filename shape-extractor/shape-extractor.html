<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner - Shape Extractor</title>
    
    <!-- We load OpenCV.js asynchronously -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #videoElement {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            z-index: 1;
        }
        #videoElement.mirrored, #canvasOutput.mirrored {
            transform: scaleX(-1);
        }

        #canvasOutput {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            cursor: crosshair;
        }

        /* Loading UI */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.6s;
            color: #fff;
        }
        #loader h2 { font-weight: 300; letter-spacing: 3px; font-size: 1.4rem; }
        #loader p { color: #888; font-size: 0.9rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00fbff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-out { opacity: 0; pointer-events: none; }

        /* Navigation */
        .back-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 50;
            background: rgba(10,10,30,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 8px 14px;
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Flip btn */
        .flip-btn {
            position: fixed;
            top: 70px; right: 16px;
            z-index: 50;
            background: rgba(10,10,30,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .flip-btn:hover { background: rgba(255,255,255,0.1); transform: rotate(180deg); }
        .flip-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .hud {
            position: fixed;
            top: 16px; left: 16px;
            z-index: 50;
            background: rgba(10,10,30,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 8px 14px;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Floating Extracted Stamps */
        .extracted-element {
            position: absolute;
            z-index: 100;
            border: 2px solid #00ffcc;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.4), inset 0 0 15px rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            cursor: grab;
            transition: box-shadow 0.2s;
            min-width: 30px;
            min-height: 30px;
        }
        .extracted-element:active {
            cursor: grabbing;
        }
        .extracted-element.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.3), 0 15px 40px rgba(0, 255, 204, 0.6);
        }

        /* Delete button - always visible */
        .close-btn {
            position: absolute;
            top: -14px;
            right: -14px;
            width: 28px;
            height: 28px;
            background: #ff3366;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 26px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(255,51,102,0.5);
            z-index: 110;
            opacity: 1;
            transition: transform 0.15s, background 0.15s;
        }
        .close-btn:hover, .close-btn:active {
            background: #ff0044;
            transform: scale(1.15);
        }

        /* Resize handles - large touch targets on mobile */
        .resize-handle {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #00ffcc;
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 105;
            cursor: nwse-resize;
            box-shadow: 0 0 6px rgba(0,255,204,0.6);
            transition: transform 0.1s;
            touch-action: none;
            /* Invisible padding for bigger touch target */
        }
        .resize-handle::before {
            content: '';
            position: absolute;
            top: -15px; left: -15px;
            width: 48px; height: 48px;
            border-radius: 50%;
        }
        .resize-handle:hover, .resize-handle:active {
            transform: scale(1.3);
            background: #fff;
        }
        .resize-handle.tl { top: -9px; left: -9px; cursor: nwse-resize; }
        .resize-handle.tr { top: -9px; right: -9px; cursor: nesw-resize; }
        .resize-handle.bl { bottom: -9px; left: -9px; cursor: nesw-resize; }
        .resize-handle.br { bottom: -9px; right: -9px; cursor: nwse-resize; }

        @media (max-width: 768px) {
            .resize-handle {
                width: 24px;
                height: 24px;
            }
            .resize-handle.tl { top: -12px; left: -12px; }
            .resize-handle.tr { top: -12px; right: -12px; }
            .resize-handle.bl { bottom: -12px; left: -12px; }
            .resize-handle.br { bottom: -12px; right: -12px; }
            .close-btn {
                width: 34px;
                height: 34px;
                line-height: 30px;
                font-size: 20px;
                top: -17px;
                right: -17px;
            }
        }

        /* Shape label */
        .shape-label {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #00ffcc;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h2>SHAPE EXTRACTOR</h2>
    <p>Loading Computer Vision engine…</p>
</div>

<a href="../index.html" class="back-btn">← Back</a>
<div class="flip-btn" id="flipBtn" title="Flip Camera">
    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
</div>
<div class="hud" id="hud">Tap a shape to extract</div>

<!-- Video Feed -->
<video id="videoElement" autoplay playsinline muted></video>
<!-- Output Canvas overlay for bounding boxes -->
<canvas id="canvasOutput"></canvas>

<script>
let video = document.getElementById('videoElement');
let canvasOutput = document.getElementById('canvasOutput');
let ctx = canvasOutput.getContext('2d');
let openCvLoaded = false;
let streaming = false;
let currentFacingMode = 'environment';
let currentStream = null;
const FPS = 30;

// Store the detected bounding boxes so we can test clicks
let activeGeometry = [];

// When OpenCV finishes loading from script tag
function onOpenCvReady() {
    console.log("OpenCV is ready.");
    cv = window.cv;
    openCvLoaded = true;
    startCamera();
}

async function startCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const isPortrait = window.innerHeight > window.innerWidth;
    const constraints = {
        video: {
            facingMode: currentFacingMode,
            aspectRatio: { ideal: isPortrait ? 9/16 : 16/9 }
        }
    };

    // Mirroring control
    if (currentFacingMode === 'user') {
        video.classList.add('mirrored');
        canvasOutput.classList.add('mirrored');
    } else {
        video.classList.remove('mirrored');
        canvasOutput.classList.remove('mirrored');
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        currentStream = stream;
        video.srcObject = stream;
        video.play();
        
        video.addEventListener('canplay', () => {
            if (!streaming) {
                resizeCanvas();
                streaming = true;
                document.getElementById('loader').classList.add('fade-out');
                setTimeout(scheduleProcessVideo, 500); 
            }
        }, { once: true });
    } catch (err) {
        console.error("Camera error:", err);
        if (currentFacingMode === 'environment') {
            currentFacingMode = 'user';
            startCamera();
        } else {
            alert("Camera error: " + err);
        }
    }
}

document.getElementById('flipBtn').addEventListener('click', () => {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    startCamera();
});

function resizeCanvas() {
    canvasOutput.width = window.innerWidth;
    canvasOutput.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

// Setup an offscreen canvas to read raw video frames into OpenCV Mat
let offscreenCanvas = document.createElement('canvas');
let offCtx = offscreenCanvas.getContext('2d');

let srcMat, grayMat, blurMat, edgeMat, contours, hierarchy;
let hsvMat, skinMask, skinContours, skinHierarchy;

function scheduleProcessVideo() {
    if (!srcMat) {
        // Initialize Mats
        offscreenCanvas.width = video.videoWidth;
        offscreenCanvas.height = video.videoHeight;
        srcMat = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
        grayMat = new cv.Mat();
        blurMat = new cv.Mat();
        edgeMat = new cv.Mat();
        contours = new cv.MatVector();
        hierarchy = new cv.Mat();
        hsvMat = new cv.Mat();
        skinMask = new cv.Mat();
        skinContours = new cv.MatVector();
        skinHierarchy = new cv.Mat();
    }
    setTimeout(processVideo, 0);
}

function processVideo() {
    if (!streaming || !openCvLoaded) return;
    
    let begin = Date.now();
    
    offCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
    srcMat.data.set(offCtx.getImageData(0, 0, video.videoWidth, video.videoHeight).data);
    
    // Grayscale & Blur
    cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(grayMat, blurMat, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
    
    // Canny Edge Detection
    cv.Canny(blurMat, edgeMat, 50, 150);
    
    // Find Contours
    contours.delete();
    hierarchy.delete();
    contours = new cv.MatVector();
    hierarchy = new cv.Mat();
    cv.findContours(edgeMat, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
    
    ctx.clearRect(0, 0, canvasOutput.width, canvasOutput.height);
    activeGeometry = [];
    
    // Scale factors for object-fit: contain
    const videoRatio = video.videoWidth / video.videoHeight;
    const windowRatio = window.innerWidth / window.innerHeight;
    
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    
    if (windowRatio > videoRatio) {
        scale = window.innerHeight / video.videoHeight;
        offsetX = (window.innerWidth - (video.videoWidth * scale)) / 2;
    } else {
        scale = window.innerWidth / video.videoWidth;
        offsetY = (window.innerHeight - (video.videoHeight * scale)) / 2;
    }

    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';

    // --- SHAPE DETECTION ---
    for (let i = 0; i < contours.size(); ++i) {
        let contour = contours.get(i);
        let area = cv.contourArea(contour);
        
        if (area > 800) {
            let tmp = new cv.Mat();
            let perimeter = cv.arcLength(contour, true);
            cv.approxPolyDP(contour, tmp, 0.02 * perimeter, true);
            
            const vertices = tmp.rows;
            let shapeName = "";
            let color = "";
            let rect = cv.boundingRect(tmp);
            
            // Circularity check: 4π·area / perimeter²  (1.0 = perfect circle)
            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
            
            if (vertices === 3) {
                shapeName = "Triangle";
                color = "#ff0088";
            } else if (vertices === 4) {
                let aspectRatio = rect.width / rect.height;
                if (aspectRatio >= 0.90 && aspectRatio <= 1.10) {
                    shapeName = "Square";
                    color = "#00ffcc";
                } else {
                    shapeName = "Rectangle";
                    color = "#ffcc00";
                }
            } else if (vertices === 5) {
                shapeName = "Pentagon";
                color = "#ff6600";
            } else if (vertices === 6) {
                shapeName = "Hexagon";
                color = "#00ccff";
            } else if (vertices > 6 && circularity > 0.65) {
                // High circularity = sphere/circle
                let ar = rect.width / rect.height;
                if (ar >= 0.7 && ar <= 1.4) {
                    shapeName = "Sphere";
                    color = "#bb00ff";
                } else {
                    shapeName = "Ellipse";
                    color = "#ff44aa";
                }
            } else if (vertices > 6) {
                shapeName = "Polygon";
                color = "#88aaff";
            }

            if (shapeName !== "") {
                let screenX = (rect.x * scale) + offsetX;
                let screenY = (rect.y * scale) + offsetY;
                let screenW = rect.width * scale;
                let screenH = rect.height * scale;
                
                if (screenX + screenW > 0 && screenX < window.innerWidth &&
                    screenY + screenH > 0 && screenY < window.innerHeight) {
                    
                    activeGeometry.push({
                        type: shapeName,
                        x: screenX,
                        y: screenY,
                        w: screenW,
                        h: screenH,
                        color: color,
                        origX: rect.x,
                        origY: rect.y,
                        origW: rect.width,
                        origH: rect.height
                    });

                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    ctx.strokeStyle = color;
                    
                    // Draw circle/sphere with ellipse, others with rect
                    if (shapeName === 'Sphere' || shapeName === 'Ellipse') {
                        ctx.beginPath();
                        ctx.ellipse(screenX + screenW/2, screenY + screenH/2, screenW/2, screenH/2, 0, 0, Math.PI * 2);
                        ctx.stroke();
                    } else {
                        ctx.strokeRect(screenX, screenY, screenW, screenH);
                    }
                    
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = color;
                    ctx.font = "14px monospace";
                    ctx.fillText(shapeName, screenX, screenY - 8);
                }
            }
            tmp.delete();
        }
    }

    // --- FACE / SKIN DETECTION ---
    try {
        let rgbMat = new cv.Mat();
        cv.cvtColor(srcMat, rgbMat, cv.COLOR_RGBA2RGB);
        cv.cvtColor(rgbMat, hsvMat, cv.COLOR_RGB2HSV);
        
        // Skin color range in HSV
        let low = new cv.Mat(hsvMat.rows, hsvMat.cols, hsvMat.type(), [0, 30, 60, 0]);
        let high = new cv.Mat(hsvMat.rows, hsvMat.cols, hsvMat.type(), [25, 175, 255, 255]);
        cv.inRange(hsvMat, low, high, skinMask);
        
        // Morphological cleanup
        let kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(9, 9));
        cv.morphologyEx(skinMask, skinMask, cv.MORPH_CLOSE, kernel);
        cv.morphologyEx(skinMask, skinMask, cv.MORPH_OPEN, kernel);
        
        skinContours.delete();
        skinHierarchy.delete();
        skinContours = new cv.MatVector();
        skinHierarchy = new cv.Mat();
        cv.findContours(skinMask, skinContours, skinHierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        for (let i = 0; i < skinContours.size(); i++) {
            let cnt = skinContours.get(i);
            let area = cv.contourArea(cnt);
            
            // Faces are large skin-colored blobs with roughly round aspect ratio
            if (area > 5000) {
                let rect = cv.boundingRect(cnt);
                let aspectRatio = rect.width / rect.height;
                
                // Face-like proportions (roughly oval, not too wide/narrow)
                if (aspectRatio > 0.5 && aspectRatio < 1.1 && rect.height > 40) {
                    let screenX = (rect.x * scale) + offsetX;
                    let screenY = (rect.y * scale) + offsetY;
                    let screenW = rect.width * scale;
                    let screenH = rect.height * scale;
                    
                    if (screenX + screenW > 0 && screenX < window.innerWidth &&
                        screenY + screenH > 0 && screenY < window.innerHeight) {
                        
                        let faceColor = '#ff9500';
                        activeGeometry.push({
                            type: 'Face',
                            x: screenX,
                            y: screenY,
                            w: screenW,
                            h: screenH,
                            color: faceColor,
                            origX: rect.x,
                            origY: rect.y,
                            origW: rect.width,
                            origH: rect.height
                        });
                        
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = faceColor;
                        ctx.strokeStyle = faceColor;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.ellipse(screenX + screenW/2, screenY + screenH/2, screenW/2, screenH/2, 0, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = faceColor;
                        ctx.font = "14px monospace";
                        ctx.fillText('👤 Face', screenX, screenY - 8);
                    }
                }
            }
        }
        
        rgbMat.delete();
        low.delete();
        high.delete();
        kernel.delete();
    } catch(e) { /* skin detection may fail on some frames */ }
    
    let delay = 1000/FPS - (Date.now() - begin);
    setTimeout(processVideo, delay > 0 ? delay : 0);
}

// Extraction Interaction
canvasOutput.addEventListener('click', (e) => {
    let clickX = e.clientX;
    let clickY = e.clientY;

    // Search active geometry for a match
    for (let shape of activeGeometry) {
        let testX = clickX;
        // If mirrored, we need to flip the clickX to match the internal coordinate system
        if (currentFacingMode === 'user') {
            testX = window.innerWidth - clickX;
        }

        if (testX >= shape.x && testX <= shape.x + shape.w &&
            clickY >= shape.y && clickY <= shape.y + shape.h) {
            
            extractShape(shape);
            break;
        }
    }
});

function extractShape(shape) {
    let snapshotCanvas = document.createElement('canvas');
    snapshotCanvas.width = shape.origW;
    snapshotCanvas.height = shape.origH;
    let sxCtx = snapshotCanvas.getContext('2d');
    sxCtx.drawImage(offscreenCanvas, 
        shape.origX, shape.origY, shape.origW, shape.origH, 
        0, 0, shape.origW, shape.origH);
        
    // Create UI container
    let container = document.createElement('div');
    container.className = 'extracted-element';
    container.style.left = shape.x + 'px';
    container.style.top = shape.y + 'px';
    container.style.width = shape.w + 'px';
    container.style.height = shape.h + 'px';
    container.style.borderColor = shape.color;
    container.style.boxShadow = `0 10px 30px ${shape.color}66, inset 0 0 15px ${shape.color}44`;
    container.dataset.aspectRatio = shape.w / shape.h;
    
    // Create inner image
    let img = document.createElement('img');
    img.src = snapshotCanvas.toDataURL('image/png');
    img.style.width = '100%';
    img.style.height = '100%';
    img.style.pointerEvents = 'none';
    img.style.borderRadius = '6px';
    img.draggable = false;
    container.appendChild(img);

    // Delete button (always visible)
    let closeBtn = document.createElement('div');
    closeBtn.className = 'close-btn';
    closeBtn.innerHTML = '×';
    function removeElement(e) {
        e.stopPropagation();
        e.preventDefault();
        container.style.transition = 'transform 0.25s, opacity 0.25s';
        container.style.transform = 'scale(0)';
        container.style.opacity = '0';
        setTimeout(() => { if (container.parentNode) container.parentNode.removeChild(container); }, 260);
    }
    closeBtn.addEventListener('click', removeElement);
    closeBtn.addEventListener('touchstart', removeElement, {passive: false});
    container.appendChild(closeBtn);

    // Resize handles (4 corners)
    ['tl','tr','bl','br'].forEach(pos => {
        let handle = document.createElement('div');
        handle.className = 'resize-handle ' + pos;
        handle.dataset.corner = pos;
        container.appendChild(handle);
    });

    // Shape label
    let label = document.createElement('div');
    label.className = 'shape-label';
    label.textContent = shape.type;
    container.appendChild(label);

    document.body.appendChild(container);
    makeDraggableAndResizable(container);

    // Update HUD
    document.getElementById('hud').textContent = `Extracted: ${shape.type} — drag to move, corners to resize`;
}

// Drag + Resize system
function makeDraggableAndResizable(el) {
    let isDragging = false;
    let isResizing = false;
    let resizeCorner = '';
    let startX, startY;
    let initialLeft, initialTop, initialW, initialH;

    function getEvent(e) {
        return e.type.includes('mouse') ? e : e.touches[0];
    }

    function startInteraction(e) {
        if (e.target.classList.contains('close-btn')) return;
        
        let ev = getEvent(e);
        if (!ev) return;
        startX = ev.clientX;
        startY = ev.clientY;
        initialLeft = parseInt(el.style.left) || 0;
        initialTop = parseInt(el.style.top) || 0;
        initialW = el.offsetWidth;
        initialH = el.offsetHeight;
        
        // Select this element
        document.querySelectorAll('.extracted-element').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        el.style.zIndex = 1000 + document.querySelectorAll('.extracted-element').length;

        // Check if target or any ancestor is a resize handle
        let target = e.target;
        let isHandle = false;
        while (target && target !== el) {
            if (target.classList && target.classList.contains('resize-handle')) {
                isHandle = true;
                isResizing = true;
                resizeCorner = target.dataset.corner;
                break;
            }
            target = target.parentElement;
        }
        
        if (isHandle) {
            e.preventDefault();
            e.stopPropagation();
        } else {
            isDragging = true;
        }
    }

    function moveInteraction(e) {
        if (!isDragging && !isResizing) return;
        e.preventDefault();
        let ev = getEvent(e);
        let dx = ev.clientX - startX;
        let dy = ev.clientY - startY;

        if (isDragging) {
            el.style.left = (initialLeft + dx) + 'px';
            el.style.top = (initialTop + dy) + 'px';
        } else if (isResizing) {
            let newW = initialW;
            let newH = initialH;
            let newL = initialLeft;
            let newT = initialTop;

            if (resizeCorner === 'br') {
                newW = Math.max(30, initialW + dx);
                newH = Math.max(30, initialH + dy);
            } else if (resizeCorner === 'bl') {
                newW = Math.max(30, initialW - dx);
                newH = Math.max(30, initialH + dy);
                newL = initialLeft + (initialW - newW);
            } else if (resizeCorner === 'tr') {
                newW = Math.max(30, initialW + dx);
                newH = Math.max(30, initialH - dy);
                newT = initialTop + (initialH - newH);
            } else if (resizeCorner === 'tl') {
                newW = Math.max(30, initialW - dx);
                newH = Math.max(30, initialH - dy);
                newL = initialLeft + (initialW - newW);
                newT = initialTop + (initialH - newH);
            }

            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
            el.style.left = newL + 'px';
            el.style.top = newT + 'px';
        }
    }

    function endInteraction() {
        isDragging = false;
        isResizing = false;
    }

    el.addEventListener('mousedown', startInteraction);
    window.addEventListener('mousemove', moveInteraction);
    window.addEventListener('mouseup', endInteraction);

    el.addEventListener('touchstart', startInteraction, {passive: false});
    window.addEventListener('touchmove', moveInteraction, {passive: false});
    window.addEventListener('touchend', endInteraction);

    // Pinch-to-resize for touch
    let lastPinchDist = 0;
    let pinchStartW = 0;
    let pinchStartH = 0;
    
    el.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            lastPinchDist = Math.hypot(dx, dy);
            pinchStartW = el.offsetWidth;
            pinchStartH = el.offsetHeight;
            isDragging = false;
        }
    }, {passive: true});

    el.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            let dx = e.touches[0].clientX - e.touches[1].clientX;
            let dy = e.touches[0].clientY - e.touches[1].clientY;
            let dist = Math.hypot(dx, dy);
            let scale = dist / lastPinchDist;
            let newW = Math.max(30, pinchStartW * scale);
            let newH = Math.max(30, pinchStartH * scale);
            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
        }
    }, {passive: false});
}

</script>
</body>
</html>
