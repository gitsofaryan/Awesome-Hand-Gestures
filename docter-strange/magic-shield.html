<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Shield - Hand Detection</title>

    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
        font-family: Arial, sans-serif;
      }
      #v_src,
      #mainCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
      }
      #mainCanvas {
        z-index: 10;
        pointer-events: none;
      }
      .info {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #00ff00;
        font-size: 14px;
        z-index: 100;
        font-family: monospace;
        background: rgba(0, 0, 0, 0.5);
        padding: 10px;
        border-radius: 5px;
      }
      /* Back button */
      .back-btn {
          position: fixed;
          top: 16px; right: 16px;
          z-index: 200;
          background: rgba(10,10,30,0.55);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 12px;
          padding: 10px 18px;
          color: #fff;
          text-decoration: none;
          font-size: 0.82rem;
          font-weight: 600;
          transition: all 0.2s;
          font-family: sans-serif;
      }
      .back-btn:hover { background: rgba(255,255,255,0.1); }

      /* Flip btn */
      .flip-btn {
          position: fixed;
          top: 70px; right: 16px;
          z-index: 210;
          background: rgba(10,10,30,0.55);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          border: 1px solid rgba(255,255,255,0.1);
          border-radius: 50%;
          width: 44px; height: 44px;
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          cursor: pointer;
          transition: all 0.2s;
      }
      .flip-btn:hover { background: rgba(255,255,255,0.1); transform: rotate(180deg); }
      .flip-btn svg { width: 22px; height: 22px; fill: currentColor; }

      /* Loading overlay */
      #loader {
          position: fixed;
          inset: 0;
          z-index: 1000;
          background: rgba(0,0,0,0.92);
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 20px;
          transition: opacity 0.6s;
          font-family: sans-serif;
      }
      #loader h2 { font-weight: 300; letter-spacing: 3px; font-size: 1.4rem; color: #fff; margin:0;}
      #loader p { color: #666; font-size: 0.9rem; margin:0;}
      .spinner {
          width: 40px; height: 40px;
          border: 3px solid rgba(255,255,255,0.1);
          border-top-color: #00fbff;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); }}
      .fade-out { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="loader">
        <div class="spinner"></div>
        <h2>MYSTIC MODE</h2>
        <p>Loading hand tracking model…</p>
    </div>
    <a href="../index.html" class="back-btn">← Back</a>
    <div class="flip-btn" id="flipBtn" title="Flip Camera">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
    </div>

    <video id="v_src" autoplay playsinline></video>
    <canvas id="mainCanvas"></canvas>

    <script>
      const vElement = document.getElementById("v_src");
      const canvasElement = document.getElementById("mainCanvas");
      const ctx = canvasElement.getContext("2d");

      let deg = 0;
      let img1 = null;
      let img2 = null;
      let img3 = null;
      let img4 = null;
      let currentFacingMode = 'user';
      let currentStream = null;

      // Smoothing state
      let smoothedRawLandmarks = [null, null];
      const alpha = 0.65;

      function applyEMA(newPoints, handIdx) {
        if (!smoothedRawLandmarks[handIdx] || smoothedRawLandmarks[handIdx].length !== newPoints.length) {
          smoothedRawLandmarks[handIdx] = JSON.parse(JSON.stringify(newPoints));
          return smoothedRawLandmarks[handIdx];
        }
        for (let i = 0; i < newPoints.length; i++) {
          smoothedRawLandmarks[handIdx][i].x = smoothedRawLandmarks[handIdx][i].x * (1 - alpha) + newPoints[i].x * alpha;
          smoothedRawLandmarks[handIdx][i].y = smoothedRawLandmarks[handIdx][i].y * (1 - alpha) + newPoints[i].y * alpha;
          smoothedRawLandmarks[handIdx][i].z = smoothedRawLandmarks[handIdx][i].z * (1 - alpha) + newPoints[i].z * alpha;
        }
        return smoothedRawLandmarks[handIdx];
      }

      // Load all magic circle images
      function loadImages() {
        img1 = new Image();
        img1.src = "../assets/magic_circle_1.png";

        img2 = new Image();
        img2.src = "../assets/magic_circle_2.png";

        img3 = new Image();
        img3.src = "../assets/magic_circle_ccw.png";

        img4 = new Image();
        img4.src = "../assets/magic_circle_cw.png";
      }

      function positionData(lmList) {
        return {
          wrist: [lmList[0][0], lmList[0][1]],
          thumb_tip: [lmList[4][0], lmList[4][1]],
          index_mcp: [lmList[5][0], lmList[5][1]],
          index_tip: [lmList[8][0], lmList[8][1]],
          middle_mcp: [lmList[9][0], lmList[9][1]],
          middle_tip: [lmList[12][0], lmList[12][1]],
          ring_tip: [lmList[16][0], lmList[16][1]],
          pinky_tip: [lmList[20][0], lmList[20][1]],
        };
      }

      function calculateDistance(p1, p2) {
        const x1 = p1[0],
          y1 = p1[1],
          x2 = p2[0],
          y2 = p2[1];
        return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
      }

      function detectGesture(pos) {
        const wrist = pos.wrist;
        const thumb = pos.thumb_tip;
        const index = pos.index_tip;
        const middle = pos.middle_tip;
        const ring = pos.ring_tip;
        const pinky = pos.pinky_tip;

        // Calculate distances for each finger
        const distThumb = calculateDistance(wrist, thumb);
        const distIndex = calculateDistance(wrist, index);
        const distMiddle = calculateDistance(wrist, middle);
        const distRing = calculateDistance(wrist, ring);
        const distPinky = calculateDistance(wrist, pinky);

        // Threshold for finger extension
        const palmDist = calculateDistance(wrist, pos.index_mcp);
        const extThreshold = palmDist * 1.2;

        const isThumbUp = distThumb > extThreshold;
        const isIndexUp = distIndex > extThreshold;
        const isMiddleUp = distMiddle > extThreshold;
        const isRingUp = distRing > extThreshold;
        const isPinkyUp = distPinky > extThreshold;

        const fingerCount = [
          isThumbUp,
          isIndexUp,
          isMiddleUp,
          isRingUp,
          isPinkyUp,
        ].filter(Boolean).length;

        // Gesture detection
        if (fingerCount === 5) return "open"; // All fingers open
        if (fingerCount === 0) return "fist"; // All closed
        if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) return "peace"; // Peace sign
        if (isThumbUp && !isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp)
          return "thumbsup"; // Thumbs up
        if (isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) return "point"; // Pointing
        if (isIndexUp && isPinkyUp && !isMiddleUp && !isRingUp) return "rock"; // Rock sign
        if (isThumbUp && isIndexUp && isMiddleUp && isRingUp && isPinkyUp)
          return "open"; // Open hand

        return "idle";
      }

      function drawRotatedImage(img, x, y, width, height, angle) {
        if (!img || !img.complete) return;

        ctx.save();
        ctx.translate(x + width / 2, y + height / 2);
        ctx.rotate((angle * Math.PI) / 180);
        ctx.drawImage(img, -width / 2, -height / 2, width, height);
        ctx.restore();
      }

      function drawShield(pos, gesture, centerX, centerY, diameter) {
        const gestureShields = {
          open: { img: img1, speed: 2 },
          fist: { img: img2, speed: 3 },
          peace: { img: img3, speed: 2.5 },
          thumbsup: { img: img4, speed: 3.5 },
          point: { img: img1, speed: 2 },
          rock: { img: img2, speed: 4 },
        };

        const shield = gestureShields[gesture] || gestureShields["open"];

        if (shield.img) {
          deg += shield.speed;
          if (deg > 360) deg = 0;

          drawRotatedImage(
            shield.img,
            centerX - diameter / 2,
            centerY - diameter / 2,
            diameter,
            diameter,
            deg,
          );
        }
      }

      function onResults(res) {
        const loader = document.getElementById('loader');
        if (loader && !loader.classList.contains('fade-out')) {
            loader.classList.add('fade-out');
        }

        canvasElement.width = vElement.videoWidth;
        canvasElement.height = vElement.videoHeight;

        ctx.save();
        if (currentFacingMode === 'user') {
            ctx.translate(canvasElement.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(vElement, 0, 0, canvasElement.width, canvasElement.height);
        ctx.restore();

        if (res.multiHandLandmarks && res.multiHandedness) {
          res.multiHandLandmarks.forEach((rawPts, i) => {
            const pts = applyEMA(rawPts, i);
            
            // Mirror landmarks ONLY if user camera
            const lmList = pts.map((lm) => {
                let x = currentFacingMode === 'user' ? (1 - lm.x) : lm.x;
                return [x * canvasElement.width, lm.y * canvasElement.height];
            });

            const pos = positionData(lmList);
            const gesture = detectGesture(pos);

            if (gesture !== "idle") {
              const palm = calculateDistance(pos.wrist, pos.index_mcp);
              const shieldSize = 3.5;
              let diameter = Math.round(palm * shieldSize);

              const centerX = pos.middle_mcp[0];
              const centerY = pos.middle_mcp[1];

              // Boundary checks
              const w = canvasElement.width;
              const h = canvasElement.height;

              let x1 = Math.round(centerX - diameter / 2);
              let y1 = Math.round(centerY - diameter / 2);

              if (x1 < 0) x1 = 0;
              if (x1 > w) x1 = w;
              if (y1 < 0) y1 = 0;
              if (y1 > h) y1 = h;
              if (x1 + diameter > w) diameter = w - x1;
              if (y1 + diameter > h) diameter = h - y1;

              if (diameter > 0) {
                drawShield(pos, gesture, centerX, centerY, diameter);
              }
            }
          });
        }
      }

      // Initialize Hands
      const hands = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
      });

      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });

      hands.onResults(onResults);

      // Load images
      loadImages();

      async function setupCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const isPortrait = window.innerHeight > window.innerWidth;
        const constraints = {
          video: {
            facingMode: currentFacingMode,
            aspectRatio: { ideal: isPortrait ? 9/16 : 16/9 }
          }
        };

        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          currentStream = stream;
          vElement.srcObject = stream;
          await new Promise(resolve => {
            vElement.onloadedmetadata = () => { resolve(); };
          });
          vElement.play();

          async function detectionFrame() {
            if (!vElement.paused && !vElement.ended) {
              await hands.send({ image: vElement });
            }
            requestAnimationFrame(detectionFrame);
          }
          detectionFrame();
        } catch (error) {
          console.error("Camera access error:", error);
          if (currentFacingMode === 'environment') {
              currentFacingMode = 'user';
              setupCamera();
          } else {
              alert("Could not access camera. " + error);
          }
        }
      }

      document.getElementById('flipBtn').addEventListener('click', () => {
          currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
          setupCamera();
      });

      setupCamera();
    </script>
  </body>
</html>
