<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Iron HUD — Repulsor AR</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            touch-action: none;
        }

        #videoEl {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: contain;
            z-index: 0;
            filter: brightness(0.35) contrast(1.2) saturate(0.6);
        }
        #videoEl.mirrored { transform: scaleX(-1); }

        #hudCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 2;
            pointer-events: none;
        }

        #fxCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 3;
            pointer-events: none;
        }

        /* HUD Panel */
        .hud {
            position: fixed;
            top: 16px; left: 16px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hud-panel {
            background: rgba(0, 180, 255, 0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 180, 255, 0.2);
            border-radius: 4px;
            padding: 10px 16px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: rgba(0, 200, 255, 0.8);
            min-width: 150px;
        }
        .hud-panel .val { color: #00d4ff; font-weight: 700; }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 20;
            background: rgba(0, 120, 200, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 180, 255, 0.2);
            border-radius: 4px;
            padding: 10px 18px;
            color: #00d4ff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(0, 180, 255, 0.2); }

        /* Flip btn */
        .flip-btn {
            position: fixed;
            top: 66px; right: 16px;
            z-index: 30;
            background: rgba(0, 120, 200, 0.15);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 180, 255, 0.2);
            border-radius: 50%;
            width: 44px; height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .flip-btn:hover { background: rgba(0, 180, 255, 0.2); transform: rotate(180deg); }
        .flip-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* Loading overlay */
        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.6s;
        }
        #loader h2 { font-weight: 400; letter-spacing: 6px; font-size: 1.2rem; color: #00d4ff; }
        #loader p { color: #555; font-size: 0.85rem; font-family: 'Share Tech Mono', monospace; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0, 180, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); }}
        .fade-out { opacity: 0; pointer-events: none; }

        /* Toolbar */
        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 6px;
            background: rgba(0, 120, 200, 0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 4px;
            padding: 6px 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95vw;
        }
        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(0, 200, 255, 0.5);
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }
        .tool-btn.active {
            background: rgba(0, 180, 255, 0.12);
            border-color: rgba(0, 180, 255, 0.3);
            color: #00d4ff;
        }
        .tool-btn:hover { color: #00d4ff; }

        @media (max-width: 600px) {
            .hud { top: 10px; left: 10px; }
            .hud-panel { padding: 6px 10px; font-size: 0.65rem; min-width: 120px; }
            .toolbar { bottom: 12px; padding: 5px 8px; gap: 4px; }
            .tool-btn { padding: 6px 10px; font-size: 0.6rem; }
            .back-btn { padding: 8px 12px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <h2>IRON HUD</h2>
    <p>Initializing repulsor systems...</p>
</div>

<video id="videoEl" autoplay playsinline></video>
<canvas id="hudCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<a href="../index.html" class="back-btn">← BACK</a>
<div class="flip-btn" id="flipBtn" title="Flip Camera">
    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
</div>

<div class="hud">
    <div class="hud-panel">
        SYSTEMS: <span class="val" id="h-status">ONLINE</span>
    </div>
    <div class="hud-panel">
        HANDS: <span class="val" id="h-count">0</span> &ensp;|&ensp;FPS: <span class="val" id="h-fps">0</span>
    </div>
    <div class="hud-panel">
        MODE: <span class="val" id="h-mode">TARGETING</span>
    </div>
</div>

<div class="toolbar">
    <button class="tool-btn active" data-mode="target">⊕ TARGETING</button>
    <button class="tool-btn" data-mode="repulsor">⚡ REPULSOR</button>
    <button class="tool-btn" data-mode="scan">📡 SCAN</button>
</div>

<script>
// ─── GLOBALS ──────────────────────────────
const video = document.getElementById('videoEl');
const hudCanvas = document.getElementById('hudCanvas');
const fxCanvas = document.getElementById('fxCanvas');
const hudCtx = hudCanvas.getContext('2d');
const fxCtx = fxCanvas.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
let time = 0, lastT = performance.now(), fps = 0, fc = 0, fpsT = performance.now();
let currentHands = [];
let currentFacingMode = 'user';
let currentStream = null;
let hudMode = 'target';

// Smoothing state
let smoothedLandmarks = [null, null];
const alpha = 0.6;

function applyEMA(newPoints, handIdx) {
    if (!smoothedLandmarks[handIdx] || smoothedLandmarks[handIdx].length !== newPoints.length) {
        smoothedLandmarks[handIdx] = JSON.parse(JSON.stringify(newPoints));
        return smoothedLandmarks[handIdx];
    }
    for (let i = 0; i < newPoints.length; i++) {
        smoothedLandmarks[handIdx][i].x = smoothedLandmarks[handIdx][i].x * (1 - alpha) + newPoints[i].x * alpha;
        smoothedLandmarks[handIdx][i].y = smoothedLandmarks[handIdx][i].y * (1 - alpha) + newPoints[i].y * alpha;
        smoothedLandmarks[handIdx][i].z = smoothedLandmarks[handIdx][i].z * (1 - alpha) + newPoints[i].z * alpha;
    }
    return smoothedLandmarks[handIdx];
}

// Repulsor particles
let repulsorParticles = [];

// ─── SETUP ────────────────────────────────
function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    hudCanvas.width = W; hudCanvas.height = H;
    fxCanvas.width = W; fxCanvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// Toolbar
document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        hudMode = btn.dataset.mode;
        document.getElementById('h-mode').textContent = btn.textContent.trim();
    });
});

// ─── COORDINATE MAPPING ──────────────────
function toScreen(lm) {
    let x = currentFacingMode === 'user' ? (1 - lm.x) : lm.x;
    return { x: x * W, y: lm.y * H };
}

// ─── HUD DRAWING ─────────────────────────
function drawReticle(ctx, x, y, size, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);

    const col = 'rgba(0, 200, 255, 0.7)';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;

    // Outer ring
    ctx.beginPath();
    ctx.arc(0, 0, size, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
    ctx.stroke();

    // Cross hairs
    const gap = size * 0.3;
    ctx.beginPath();
    ctx.moveTo(-size, 0); ctx.lineTo(-gap, 0);
    ctx.moveTo(gap, 0); ctx.lineTo(size, 0);
    ctx.moveTo(0, -size); ctx.lineTo(0, -gap);
    ctx.moveTo(0, gap); ctx.lineTo(0, size);
    ctx.stroke();

    // Corner brackets
    const b = size * 1.3;
    const l = size * 0.3;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.4)';
    ctx.beginPath();
    [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx, sy]) => {
        ctx.moveTo(sx * b, sy * (b - l));
        ctx.lineTo(sx * b, sy * b);
        ctx.lineTo(sx * (b - l), sy * b);
    });
    ctx.stroke();

    ctx.restore();
}

function drawArcReactor(ctx, x, y, radius) {
    // Glowing arc reactor circle
    const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
    gradient.addColorStop(0, 'rgba(100, 220, 255, 0.9)');
    gradient.addColorStop(0.3, 'rgba(0, 180, 255, 0.5)');
    gradient.addColorStop(0.7, 'rgba(0, 120, 200, 0.2)');
    gradient.addColorStop(1, 'rgba(0, 80, 150, 0)');

    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    // Inner triangle pattern
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(time * 2);
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.6)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const a = (Math.PI * 2 / 3) * i;
        const r1 = radius * 0.25;
        const r2 = radius * 0.7;
        ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
        ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
        ctx.stroke();
    }
    ctx.restore();

    // Rotating ring segments
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-time * 1.5);
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.4)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
        const startAngle = (Math.PI * 2 / 6) * i + 0.1;
        const endAngle = startAngle + 0.7;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.85, startAngle, endAngle);
        ctx.stroke();
    }
    ctx.restore();
}

function drawHoloPanels(ctx, x, y, hand) {
    // Floating data panel near the wrist
    const wrist = toScreen(hand[0]);
    const panelX = wrist.x + (x > W/2 ? -140 : 60);
    const panelY = wrist.y - 40;

    ctx.save();
    ctx.fillStyle = 'rgba(0, 120, 200, 0.08)';
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.3)';
    ctx.lineWidth = 1;

    // Panel background
    ctx.beginPath();
    ctx.roundRect(panelX, panelY, 120, 80, 2);
    ctx.fill();
    ctx.stroke();

    // Panel content
    ctx.font = '9px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(0, 200, 255, 0.7)';
    ctx.fillText('POWER: ' + Math.round(70 + Math.sin(time * 2) * 25) + '%', panelX + 8, panelY + 16);
    ctx.fillText('THRUST: ' + Math.round(40 + Math.cos(time * 1.5) * 30) + '%', panelX + 8, panelY + 30);
    ctx.fillText('TEMP: ' + Math.round(2800 + Math.sin(time) * 400) + 'K', panelX + 8, panelY + 44);

    // Mini bar graph
    ctx.fillStyle = 'rgba(0, 200, 255, 0.4)';
    for (let i = 0; i < 8; i++) {
        const barH = 10 + Math.sin(time * 3 + i * 0.5) * 8;
        ctx.fillRect(panelX + 8 + i * 13, panelY + 70 - barH, 10, barH);
    }

    // Connecting line from panel to palm
    ctx.beginPath();
    ctx.moveTo(x > W/2 ? panelX + 120 : panelX, panelY + 40);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.15)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
}

function drawScanRings(ctx, x, y) {
    const scanRadius = 60 + Math.sin(time * 3) * 20;
    ctx.save();
    ctx.translate(x, y);

    // Expanding scan pulse
    const pulseR = ((time * 80) % 150);
    ctx.beginPath();
    ctx.arc(0, 0, pulseR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0, 255, 100, ${0.4 * (1 - pulseR/150)})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Rotating scan line
    ctx.rotate(time * 4);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(scanRadius, 0);
    ctx.strokeStyle = 'rgba(0, 255, 100, 0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Sweep arc (like radar)
    ctx.beginPath();
    ctx.arc(0, 0, scanRadius, -0.5, 0);
    ctx.lineTo(0, 0);
    ctx.fillStyle = 'rgba(0, 255, 100, 0.1)';
    ctx.fill();

    ctx.restore();
}

// ─── REPULSOR EFFECT ─────────────────────
let wasPinching = [false, false];

function checkPinchRepulsor(hand, handIdx) {
    const thumb = toScreen(hand[4]);
    const index = toScreen(hand[8]);
    const d = Math.hypot(thumb.x - index.x, thumb.y - index.y);
    const pinch = d < 40;

    if (pinch && !wasPinching[handIdx]) {
        // REPULSOR BLAST
        const palm = toScreen(hand[9]);
        const count = 50;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 5 + Math.random() * 10;
            repulsorParticles.push({
                x: palm.x, y: palm.y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 1.0,
                decay: 0.015 + Math.random() * 0.02,
                size: 1 + Math.random() * 3,
                type: Math.random() > 0.5 ? 'blue' : 'white'
            });
        }
    }
    wasPinching[handIdx] = pinch;
}

function updateRepulsorParticles() {
    fxCtx.globalCompositeOperation = 'lighter';
    for (let i = repulsorParticles.length - 1; i >= 0; i--) {
        const p = repulsorParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= p.decay;

        if (p.life <= 0) {
            repulsorParticles.splice(i, 1);
            continue;
        }

        const col = p.type === 'blue' ? `rgba(0, 180, 255, ${p.life})` : `rgba(200, 240, 255, ${p.life})`;
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        fxCtx.fillStyle = col;
        fxCtx.fill();

        // Glow
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.size * p.life * 3, 0, Math.PI * 2);
        fxCtx.fillStyle = `rgba(0, 150, 255, ${p.life * 0.1})`;
        fxCtx.fill();
    }
    fxCtx.globalCompositeOperation = 'source-over';
}

// ─── RENDER LOOP ─────────────────────────
function render(ts) {
    requestAnimationFrame(render);
    const dt = (ts - lastT) / 1000;
    lastT = ts;
    time += dt;

    fc++;
    if (ts > fpsT + 1000) {
        fps = fc; fc = 0; fpsT = ts;
        document.getElementById('h-fps').textContent = fps;
    }

    hudCtx.clearRect(0, 0, W, H);
    fxCtx.clearRect(0, 0, W, H);

    // Draw HUD for each hand
    currentHands.forEach((hand, hi) => {
        const palm = toScreen(hand[9]);

        if (hudMode === 'target') {
            drawReticle(hudCtx, palm.x, palm.y, 45, time * 0.5 + hi * Math.PI);
            drawArcReactor(hudCtx, palm.x, palm.y, 20);
            drawHoloPanels(hudCtx, palm.x, palm.y, hand);

            // Fingertip dots
            [4, 8, 12, 16, 20].forEach(idx => {
                const pt = toScreen(hand[idx]);
                hudCtx.beginPath();
                hudCtx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
                hudCtx.fillStyle = 'rgba(0, 200, 255, 0.8)';
                hudCtx.fill();
            });

            // Skeletal lines
            hudCtx.strokeStyle = 'rgba(0, 180, 255, 0.25)';
            hudCtx.lineWidth = 1;
            if (typeof drawConnectors !== 'undefined' && typeof HAND_CONNECTIONS !== 'undefined') {
                drawConnectors(hudCtx, hand, HAND_CONNECTIONS, {
                    color: 'rgba(0, 180, 255, 0.25)',
                    lineWidth: 1
                });
            }
        }

        if (hudMode === 'repulsor') {
            drawArcReactor(hudCtx, palm.x, palm.y, 30);
            checkPinchRepulsor(hand, hi);

            // Power glow at palm
            const glow = hudCtx.createRadialGradient(palm.x, palm.y, 0, palm.x, palm.y, 60);
            glow.addColorStop(0, `rgba(100, 220, 255, ${0.3 + Math.sin(time * 5) * 0.1})`);
            glow.addColorStop(1, 'transparent');
            hudCtx.beginPath();
            hudCtx.arc(palm.x, palm.y, 60, 0, Math.PI * 2);
            hudCtx.fillStyle = glow;
            hudCtx.fill();

            // "CHARGED" text
            hudCtx.font = '10px "Orbitron", sans-serif';
            hudCtx.fillStyle = 'rgba(0, 200, 255, 0.6)';
            hudCtx.fillText('REPULSOR READY', palm.x - 45, palm.y + 50);
        }

        if (hudMode === 'scan') {
            drawScanRings(hudCtx, palm.x, palm.y);

            // Distance labels on each finger
            [8, 12, 16, 20].forEach(idx => {
                const pt = toScreen(hand[idx]);
                const dist = Math.hypot(pt.x - palm.x, pt.y - palm.y);
                hudCtx.font = '8px "Share Tech Mono", monospace';
                hudCtx.fillStyle = 'rgba(0, 255, 100, 0.6)';
                hudCtx.fillText(Math.round(dist) + 'px', pt.x + 6, pt.y - 6);

                // Line to palm
                hudCtx.beginPath();
                hudCtx.moveTo(palm.x, palm.y);
                hudCtx.lineTo(pt.x, pt.y);
                hudCtx.strokeStyle = 'rgba(0, 255, 100, 0.15)';
                hudCtx.lineWidth = 0.5;
                hudCtx.setLineDash([2, 4]);
                hudCtx.stroke();
                hudCtx.setLineDash([]);
            });
        }
    });

    // Update repulsor FX
    if (repulsorParticles.length > 0) {
        updateRepulsorParticles();
    }
    if (repulsorParticles.length > 300) {
        repulsorParticles.splice(0, repulsorParticles.length - 300);
    }

    // Global HUD elements
    drawGlobalHUD(hudCtx);

    document.getElementById('h-count').textContent = currentHands.length;
    document.getElementById('h-status').textContent = currentHands.length > 0 ? 'ACTIVE' : 'STANDBY';
}

function drawGlobalHUD(ctx) {
    // Corner brackets
    const m = 20;
    const l = 40;
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    // Top-left
    ctx.moveTo(m, m + l); ctx.lineTo(m, m); ctx.lineTo(m + l, m);
    // Top-right
    ctx.moveTo(W - m - l, m); ctx.lineTo(W - m, m); ctx.lineTo(W - m, m + l);
    // Bottom-left
    ctx.moveTo(m, H - m - l); ctx.lineTo(m, H - m); ctx.lineTo(m + l, H - m);
    // Bottom-right
    ctx.moveTo(W - m - l, H - m); ctx.lineTo(W - m, H - m); ctx.lineTo(W - m, H - m - l);
    ctx.stroke();

    // Bottom center timestamp
    ctx.font = '9px "Share Tech Mono", monospace';
    ctx.fillStyle = 'rgba(0, 180, 255, 0.3)';
    const now = new Date();
    const ts = now.toLocaleTimeString('en-US', {hour12: false}) + '.' + String(now.getMilliseconds()).padStart(3, '0');
    ctx.fillText('T: ' + ts, W/2 - 50, H - 30);

    // Scanning line
    const scanY = ((time * 60) % (H + 40)) - 20;
    ctx.beginPath();
    ctx.moveTo(0, scanY);
    ctx.lineTo(W, scanY);
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.04)';
    ctx.lineWidth = 1;
    ctx.stroke();
}

// ─── MEDIAPIPE INIT ──────────────────────
function init() {
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
        let smoothed = [];
        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((rawPts, i) => {
                smoothed.push(applyEMA(rawPts, i));
            });
        }
        currentHands = smoothed;

        const loader = document.getElementById('loader');
        if (loader && !loader.classList.contains('fade-out')) {
            loader.classList.add('fade-out');
        }
    });

    async function setupCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        const isPortrait = window.innerHeight > window.innerWidth;
        const constraints = {
            video: {
                facingMode: currentFacingMode,
                aspectRatio: { ideal: isPortrait ? 9/16 : 16/9 }
            }
        };

        if (currentFacingMode === 'user') {
            video.classList.add('mirrored');
        } else {
            video.classList.remove('mirrored');
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            currentStream = stream;
            video.srcObject = stream;
            await new Promise(resolve => {
                video.onloadedmetadata = () => { resolve(); };
            });
            video.play();

            async function detectionFrame() {
                if (!video.paused && !video.ended) {
                    await hands.send({ image: video });
                }
                requestAnimationFrame(detectionFrame);
            }
            detectionFrame();
        } catch (error) {
            console.error("Camera access error:", error);
            if (currentFacingMode === 'environment') {
                currentFacingMode = 'user';
                setupCamera();
            } else {
                alert("Could not access camera. " + error);
            }
        }
    }

    document.getElementById('flipBtn').addEventListener('click', () => {
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        setupCamera();
    });

    setupCamera();
    requestAnimationFrame(render);
}

init();
</script>
</body>
</html>
